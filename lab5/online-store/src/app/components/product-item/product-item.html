<div class="card">
  <img class="main-img" [src]="mainImage" alt="{{ product.name }}" />

  <div class="thumbnails">
    <img
      class="thumb"
      *ngFor="let img of product.images"
      [src]="img"
      alt="{{ product.name }}"
      (click)="setMainImage(img)"
    />
  </div>

  <h2>{{ product.name }}</h2>
  <p>{{ product.description }}</p>

  <p class="price">Price: {{ product.price | number }} ₸</p>
  <p class="likes">❤️ {{ product.likes || 0 }}</p>
=
  <div class="action-buttons">
    <button (click)="likeProduct()">❤️ Like</button>
    <button (click)="deleteProduct()">🗑️ Delete</button>
  </div>

  <a [href]="product.link" target="_blank">View on Kaspi</a>

  <div class="share-buttons">
    <button (click)="shareWhatsApp()">WhatsApp</button>
    <button (click)="shareTelegram()">Telegram</button>
  </div>
</div>
